# ===================================
# CareerPath India - Backend Config
# ===================================

# Server
server.port=8080

# MongoDB
spring.data.mongodb.uri=mongodb://localhost:27017/careerpathdb
spring.data.mongodb.database=careerpathdb

# JWT
jwt.secret=CareerPathIndia2024SuperSecretKeyForJWTTokenGenerationMustBe256Bits
jwt.expiration=86400000

# App Info
spring.application.name=careerpath-backend

# Logging
logging.level.org.springframework.security=WARN
logging.level.com.careerpath=DEBUG

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=Asia/Kolkata
